name: CI Pipeline

on:
  push:
    branches: ["main"]

job:
  build:
    runs-on: ubuntu-latest

  steps:
    - name: checkout code
      uses: actions/checkout@v5

    - name: setup nodejs
      uses: actions/setup-node@v3
      with:
        node-version: 20

    - name: istall dependencies
      run: npm install

    - name: Run test
      run: node test
